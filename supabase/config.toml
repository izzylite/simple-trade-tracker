# Supabase edge function configuration.
#
# Functions not listed here use the default (verify_jwt = true).
#
# Paddle calls our webhook without an auth header (signed via Paddle-Signature
# instead), so JWT verification must be disabled for that function. Lock it
# here so future redeploys via the CLI / dashboard don't silently re-enable
# JWT verification and break billing webhooks in prod.

[functions.paddle-webhook]
verify_jwt = false

# Called by the trades -> notify_trade_changes() DB webhook (no JWT); authenticates
# via the X-Trade-Webhook-Secret shared secret instead. Must stay verify_jwt=false
# or the gateway 401s every trigger fire (deploys reset this to true otherwise).
[functions.handle-trade-changes]
verify_jwt = false

# Called by the pg_cron year-stats-sweep (no JWT); authenticates via the
# X-Year-Stats-Sweep-Secret shared secret.
[functions.reconcile-year-stats]
verify_jwt = false
