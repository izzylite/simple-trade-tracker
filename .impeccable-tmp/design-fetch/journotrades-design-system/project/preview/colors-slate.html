<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Slate · the typographic neutrals</div>
  <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:6px">
    <div class="swatch" style="background:#f8fafc;color:#0f172a;min-height:56px;font-size:9px">50<span class="hex">f8fafc</span></div>
    <div class="swatch" style="background:#f1f5f9;color:#0f172a;min-height:56px;font-size:9px">100<span class="hex">f1f5f9</span></div>
    <div class="swatch" style="background:#e2e8f0;color:#0f172a;min-height:56px;font-size:9px">200<span class="hex">e2e8f0</span></div>
    <div class="swatch" style="background:#cbd5e1;color:#0f172a;min-height:56px;font-size:9px">300<span class="hex">cbd5e1</span></div>
    <div class="swatch" style="background:#94a3b8;color:#0f172a;min-height:56px;font-size:9px">400<span class="hex">94a3b8</span></div>
    <div class="swatch" style="background:#64748b;color:#fff;min-height:56px;font-size:9px">500<span class="hex">64748b</span></div>
    <div class="swatch" style="background:#334155;color:#fff;min-height:56px;font-size:9px">700<span class="hex">334155</span></div>
    <div class="swatch" style="background:#1e293b;color:#fff;min-height:56px;font-size:9px">800<span class="hex">1e293b</span></div>
    <div class="swatch" style="background:#0f172a;color:#fff;min-height:56px;font-size:9px">900<span class="hex">0f172a</span></div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    Body text and chip text resolve into this scale at both ends of the theme.
  </div>
</div></body></html>
