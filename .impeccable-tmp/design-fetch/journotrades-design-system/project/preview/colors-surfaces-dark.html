<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Surfaces — dark mode</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="swatch" style="background:#080808;color:#f1f5f9;border:1px solid var(--divider)">Page<span class="hex">#080808</span></div>
    <div class="swatch" style="background:#131313;color:#f1f5f9;border:1px solid var(--divider)">Paper<span class="hex">#131313</span></div>
    <div class="swatch" style="background:rgba(124,58,237,0.12);color:#a78bfa;border:1px solid var(--divider)">Tint Violet 12%<span class="hex">— Create tile</span></div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    Off-black, not pure. Reads as paper, not as void. Surfaces step up by tone, not by shadow.
  </div>
</div></body></html>
