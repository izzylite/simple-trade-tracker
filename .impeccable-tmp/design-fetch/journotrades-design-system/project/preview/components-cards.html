<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Cards · 12 px · paper · subtle hover lift</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="eyebrow">May</div>
      <div class="t-numeric tnum" style="color:#22c55e;margin-top:4px">+$12,840.00</div>
      <div style="font-size:13px;color:var(--fg-secondary);margin-top:6px">38 trades · 23 wins · 15 losses</div>
    </div>
    <div class="card" style="transform:translateY(-2px);box-shadow:var(--shadow-lg)">
      <div class="eyebrow">April</div>
      <div class="t-numeric tnum" style="color:#ef4444;margin-top:4px">−$3,217.40</div>
      <div style="font-size:13px;color:var(--fg-secondary);margin-top:6px">22 trades · 8 wins · 14 losses</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">Hover lifts −2 px and bumps shadow one tier. No scale, no rotation. Cards never nest.</div>
</div></body></html>
