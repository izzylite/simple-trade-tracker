<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Buttons · 8 px corners · 8/20 padding</div>
  <div class="row" style="gap:12px;flex-wrap:wrap">
    <button class="btn btn-primary">Start your logbook</button>
    <button class="btn btn-primary" style="background:#6d28d9;box-shadow:var(--shadow-md)">Hover</button>
    <button class="btn btn-outlined">Edit</button>
    <button class="btn btn-primary btn-pill">+ Create Calendar</button>
    <button class="btn btn-primary" disabled style="opacity:0.4;cursor:not-allowed">Disabled</button>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    Pill is reserved for empty-state CTAs. Hover swaps to #6d28d9 + one shadow tier.
  </div>
</div></body></html>
