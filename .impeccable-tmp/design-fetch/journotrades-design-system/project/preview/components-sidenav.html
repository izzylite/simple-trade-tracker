<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame paper" style="padding:0;flex-direction:row;min-height:480px">
  <div style="width:92px;background:var(--bg-paper);border-right:1px solid var(--divider);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px">
    <!-- Create -->
    <div style="width:44px;height:44px;border-radius:16px;background:rgba(124,58,237,0.12);display:flex;align-items:center;justify-content:center;color:#7c3aed;font-weight:700;font-size:22px">+</div>
    <div style="font-size:11px;font-weight:600;color:#f1f5f9">Create</div>
    <div style="width:60px;height:1px;background:var(--divider);margin:8px 0"></div>
    <!-- Active Home -->
    <div style="width:44px;height:44px;border-radius:16px;background:#7c3aed;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px">⌂</div>
    <div style="font-size:11px;font-weight:600;color:#7c3aed">Home</div>
    <!-- Performance -->
    <div style="width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;margin-top:6px">∥</div>
    <div style="font-size:11px;font-weight:500;color:#f1f5f9">Performance</div>
    <!-- Assistant -->
    <div style="width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;margin-top:6px">✦</div>
    <div style="font-size:11px;font-weight:500;color:#f1f5f9">Assistant</div>
    <!-- Notes -->
    <div style="width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;margin-top:6px">≡</div>
    <div style="font-size:11px;font-weight:500;color:#f1f5f9">Notes</div>
    <div style="width:60px;height:1px;background:var(--divider);margin:auto 0 8px"></div>
    <div style="width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:18px">i</div>
    <div style="font-size:11px;font-weight:500;color:#94a3b8;padding-bottom:8px">About</div>
  </div>
  <div style="flex:1;padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:6px">
    <div class="eyebrow">Side-nav · 92 px · the rail's signature</div>
    <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55;max-width:36ch">
      44 px tile · 16 px corners · 22 px icon · 11 px label.
      Active = solid Trader Violet. Create = 12% alpha. Press = 0.96 scale, 180 ms ease-out-quart.
    </div>
  </div>
</div></body></html>
