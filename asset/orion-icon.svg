<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Clip to circle -->
    <clipPath id="roundedClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>

    <!-- C2: Central nebula glow -->
    <radialGradient id="orionNebula" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="60%"  stop-color="#b45309" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- C1: Eye halo gradient -->
    <radialGradient id="orionEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- C2: Left cheek warm blush -->
    <radialGradient id="orionCheekLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- C2: Right cheek warm blush -->
    <radialGradient id="orionCheekRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>

    <!-- C1: Soft glow filter for small stars -->
    <filter id="orionSoftGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- C1: Eye sparkle filter (medium) -->
    <filter id="orionEyeFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- C1: Eye sparkle filter (large bloom) -->
    <filter id="orionEyeFilterBig" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Everything clipped inside the circle -->
  <g clip-path="url(#roundedClip)">

    <!-- C2: Nebula atmosphere ellipse -->
    <ellipse cx="50" cy="45" rx="40" ry="30" fill="url(#orionNebula)" opacity="0.8"/>

    <!-- ── Background micro-stars (C1 set + 6 C2 extras) ── -->
    <!-- C1 perimeter stars -->
    <circle cx="12"  cy="8"  r="0.5" fill="#fff8e1" opacity="0.7"/>
    <circle cx="28"  cy="14" r="0.4" fill="#fde68a" opacity="0.5"/>
    <circle cx="78"  cy="11" r="0.5" fill="#fff8e1" opacity="0.6"/>
    <circle cx="88"  cy="22" r="0.4" fill="#fde68a" opacity="0.5"/>
    <circle cx="92"  cy="68" r="0.5" fill="#fff8e1" opacity="0.6"/>
    <circle cx="84"  cy="85" r="0.4" fill="#fde68a" opacity="0.5"/>
    <circle cx="16"  cy="80" r="0.5" fill="#fff8e1" opacity="0.6"/>
    <circle cx="8"   cy="55" r="0.4" fill="#fde68a" opacity="0.4"/>
    <circle cx="22"  cy="92" r="0.4" fill="#fff8e1" opacity="0.4"/>
    <circle cx="62"  cy="93" r="0.4" fill="#fde68a" opacity="0.5"/>
    <circle cx="95"  cy="42" r="0.3" fill="#fff8e1" opacity="0.4"/>
    <circle cx="6"   cy="32" r="0.3" fill="#fde68a" opacity="0.4"/>
    <!-- C2 extra background stars -->
    <circle cx="42"  cy="6"  r="0.4" fill="#c4b5fd" opacity="0.4"/>
    <circle cx="70"  cy="5"  r="0.3" fill="#fff8e1" opacity="0.35"/>
    <circle cx="96"  cy="18" r="0.35" fill="#fde68a" opacity="0.4"/>
    <circle cx="3"   cy="75" r="0.3" fill="#fff8e1" opacity="0.3"/>
    <circle cx="55"  cy="96" r="0.35" fill="#c4b5fd" opacity="0.35"/>
    <circle cx="97"  cy="58" r="0.3" fill="#fff8e1" opacity="0.3"/>

    <!-- C2: Head outline polygon (constellation skeleton) -->
    <polygon
      points="50,18 67.3,23.2 76.5,38.5 72.5,63.5 50,78 27.5,63.5 23.5,38.5 32.7,23.2"
      fill="none"
      stroke="#f59e0b"
      stroke-width="0.4"
      stroke-linejoin="round"
      opacity="0.25"/>

    <!-- C2: Cheek glows -->
    <circle cx="28" cy="50" r="8" fill="url(#orionCheekLeft)"  opacity="1"/>
    <circle cx="72" cy="50" r="8" fill="url(#orionCheekRight)" opacity="1"/>

    <!-- ── C1: Head outline accent stars (on polygon vertices) ── -->
    <circle cx="50"   cy="18"   r="1.4" fill="#f59e0b" opacity="0.75" filter="url(#orionSoftGlow)"/>
    <circle cx="67.3" cy="23.2" r="1.2" fill="#fbbf24" opacity="0.65" filter="url(#orionSoftGlow)"/>
    <circle cx="76.5" cy="38.5" r="1.3" fill="#f59e0b" opacity="0.70" filter="url(#orionSoftGlow)"/>
    <circle cx="72.5" cy="63.5" r="1.2" fill="#fbbf24" opacity="0.65" filter="url(#orionSoftGlow)"/>
    <circle cx="50"   cy="78"   r="1.4" fill="#f59e0b" opacity="0.75" filter="url(#orionSoftGlow)"/>
    <circle cx="27.5" cy="63.5" r="1.2" fill="#fbbf24" opacity="0.65" filter="url(#orionSoftGlow)"/>
    <circle cx="23.5" cy="38.5" r="1.3" fill="#f59e0b" opacity="0.70" filter="url(#orionSoftGlow)"/>
    <circle cx="32.7" cy="23.2" r="1.2" fill="#fbbf24" opacity="0.65" filter="url(#orionSoftGlow)"/>

    <!-- ── C3: Eyebrows — 3-star arcs with connecting lines ── -->
    <!-- Left brow: (31,37) → (36,34) → (41,33.5) -->
    <line x1="31"  y1="37"   x2="36"  y2="34"   stroke="#f59e0b" stroke-width="0.5" opacity="0.40" stroke-linecap="round"/>
    <line x1="36"  y1="34"   x2="41"  y2="33.5" stroke="#f59e0b" stroke-width="0.5" opacity="0.40" stroke-linecap="round"/>
    <circle cx="31"  cy="37"   r="1.1" fill="#a78bfa" opacity="0.85" filter="url(#orionSoftGlow)"/>
    <circle cx="36"  cy="34"   r="1.0" fill="#fbbf24" opacity="0.80" filter="url(#orionSoftGlow)"/>
    <circle cx="41"  cy="33.5" r="1.0" fill="#a78bfa" opacity="0.80" filter="url(#orionSoftGlow)"/>

    <!-- Right brow: (59,33.5) → (64,34) → (69,37) -->
    <line x1="59"  y1="33.5" x2="64"  y2="34"   stroke="#f59e0b" stroke-width="0.5" opacity="0.40" stroke-linecap="round"/>
    <line x1="64"  y1="34"   x2="69"  y2="37"   stroke="#f59e0b" stroke-width="0.5" opacity="0.40" stroke-linecap="round"/>
    <circle cx="59"  cy="33.5" r="1.0" fill="#a78bfa" opacity="0.80" filter="url(#orionSoftGlow)"/>
    <circle cx="64"  cy="34"   r="1.0" fill="#fbbf24" opacity="0.80" filter="url(#orionSoftGlow)"/>
    <circle cx="69"  cy="37"   r="1.1" fill="#a78bfa" opacity="0.85" filter="url(#orionSoftGlow)"/>

    <!-- ── C3: Nose bridge lines — inner brow star to eye ── -->
    <line x1="41"  y1="33.5" x2="36"  y2="44"   stroke="#c4b5fd" stroke-width="0.4" opacity="0.25" stroke-linecap="round"/>
    <line x1="59"  y1="33.5" x2="64"  y2="44"   stroke="#c4b5fd" stroke-width="0.4" opacity="0.25" stroke-linecap="round"/>

    <!-- ── C1: LEFT EYE — r=9 halo, crosshair rays, 4-pointed sparkle, white pinpoint ── -->
    <circle cx="36" cy="44" r="9" fill="url(#orionEyeGlow)" opacity="0.55"/>
    <!-- Crosshair rays -->
    <line x1="36" y1="39" x2="36" y2="35" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="36" y1="49" x2="36" y2="53" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="31" y1="44" x2="27" y2="44" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="41" y1="44" x2="45" y2="44" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <!-- 4-pointed sparkle path -->
    <path d="M36,39 C36.4,41.2 38.8,43.6 41,44 C38.8,44.4 36.4,46.8 36,49 C35.6,46.8 33.2,44.4 31,44 C33.2,43.6 35.6,41.2 36,39 Z"
      fill="#fbbf24" opacity="0.95" filter="url(#orionEyeFilterBig)"/>
    <!-- White pinpoint -->
    <circle cx="36" cy="44" r="1.0" fill="#ffffff" opacity="1.0"/>

    <!-- ── C1: RIGHT EYE — r=9 halo, crosshair rays, 4-pointed sparkle, white pinpoint ── -->
    <circle cx="64" cy="44" r="9" fill="url(#orionEyeGlow)" opacity="0.55"/>
    <!-- Crosshair rays -->
    <line x1="64" y1="39" x2="64" y2="35" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="64" y1="49" x2="64" y2="53" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="59" y1="44" x2="55" y2="44" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="69" y1="44" x2="73" y2="44" stroke="#fde68a" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <!-- 4-pointed sparkle path -->
    <path d="M64,39 C64.4,41.2 66.8,43.6 69,44 C66.8,44.4 64.4,46.8 64,49 C63.6,46.8 61.2,44.4 59,44 C61.2,43.6 63.6,41.2 64,39 Z"
      fill="#fbbf24" opacity="0.95" filter="url(#orionEyeFilterBig)"/>
    <!-- White pinpoint -->
    <circle cx="64" cy="44" r="1.0" fill="#ffffff" opacity="1.0"/>

    <!-- ── C3: Nose — Orion's Belt diagonal at (45,54.5), (50,55.5), (55,54.5) ── -->
    <line x1="45"  y1="54.5" x2="50"  y2="55.5" stroke="#f59e0b" stroke-width="0.6" opacity="0.45" stroke-linecap="round"/>
    <line x1="50"  y1="55.5" x2="55"  y2="54.5" stroke="#f59e0b" stroke-width="0.6" opacity="0.45" stroke-linecap="round"/>
    <circle cx="45"  cy="54.5" r="1.0" fill="#f59e0b" opacity="0.80" filter="url(#orionSoftGlow)"/>
    <circle cx="50"  cy="55.5" r="1.1" fill="#fbbf24" opacity="0.85" filter="url(#orionSoftGlow)"/>
    <circle cx="55"  cy="54.5" r="1.0" fill="#f59e0b" opacity="0.80" filter="url(#orionSoftGlow)"/>

    <!-- ── C3: Wider smile arc — corners at x=30 and x=70 ── -->
    <path d="M 30 62 Q 50 76 70 62"
      fill="none"
      stroke="#f59e0b"
      stroke-width="0.9"
      opacity="0.5"
      stroke-linecap="round"/>
    <!-- Mouth arc corner and peak stars -->
    <circle cx="30"  cy="62"   r="1.3" fill="#fbbf24" opacity="0.85" filter="url(#orionSoftGlow)"/>
    <circle cx="40"  cy="68.5" r="1.2" fill="#f59e0b" opacity="0.85" filter="url(#orionSoftGlow)"/>
    <circle cx="50"  cy="71"   r="1.5" fill="#fbbf24" opacity="0.90" filter="url(#orionSoftGlow)"/>
    <circle cx="60"  cy="68.5" r="1.2" fill="#f59e0b" opacity="0.85" filter="url(#orionSoftGlow)"/>
    <circle cx="70"  cy="62"   r="1.3" fill="#fbbf24" opacity="0.85" filter="url(#orionSoftGlow)"/>

  </g>
</svg>
