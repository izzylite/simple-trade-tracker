<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Trader Violet · the only saturated brand color</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch" style="background:#7c3aed;color:#fff">Primary<span class="hex">#7c3aed</span></div>
    <div class="swatch" style="background:#a78bfa;color:#fff">Soft<span class="hex">#a78bfa</span></div>
    <div class="swatch" style="background:#6d28d9;color:#fff">Hover<span class="hex">#6d28d9</span></div>
    <div class="swatch" style="background:#5b21b6;color:#fff">Deep<span class="hex">#5b21b6</span></div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    The One Purple Rule — cap visible coverage at ~10% of any screen.
    Hover (#6d28d9) is reserved for primary-button :hover only.
  </div>
</div></body></html>
