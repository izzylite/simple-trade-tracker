<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame paper">
  <div class="eyebrow">Calendar Selector Bar · page header signature</div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;background:var(--bg-paper);border:1px solid var(--divider);border-radius:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:50%;background:rgba(124,58,237,0.18);display:flex;align-items:center;justify-content:center;color:#7c3aed;font-size:16px">📅</div>
      <div style="font-size:18px;font-weight:600;letter-spacing:-0.015em">Strategy 1A · Eval</div>
      <div style="color:var(--fg-secondary);transform:rotate(0deg);transition:transform 180ms">▾</div>
    </div>
    <div class="row" style="gap:6px;color:var(--fg-secondary);font-size:14px">
      <span style="padding:6px 8px;border-radius:6px">⤢</span>
      <span style="padding:6px 8px;border-radius:6px">↗</span>
      <span style="padding:6px 8px;border-radius:6px">?</span>
    </div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    32 px avatar · Title weight 600 · 18 px chevron rotates 180° on open. Focus ring is violet at 25% alpha.
  </div>
</div></body></html>
