<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Win / Loss · color + arrow + sign</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="swatch" style="background:#22c55e;color:#0a0a0a">Win (dark)<span class="hex">#22c55e</span></div>
    <div class="swatch" style="background:#ef4444;color:#0a0a0a">Loss (dark)<span class="hex">#ef4444</span></div>
    <div class="swatch" style="background:#16a34a;color:#fff">Win (light)<span class="hex">#16a34a</span></div>
    <div class="swatch" style="background:#dc2626;color:#fff">Loss (light)<span class="hex">#dc2626</span></div>
  </div>
  <div class="row" style="gap:24px;font-size:18px;font-weight:700;font-feature-settings:'tnum' on,'lnum' on">
    <span style="color:#22c55e">↑ +$1,247.50</span>
    <span style="color:#ef4444">↓ −$540.20</span>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">
    The Triple-Encoding Rule — color alone is forbidden. Every win pairs with ↑ and +, every loss with ↓ and −.
  </div>
</div></body></html>
