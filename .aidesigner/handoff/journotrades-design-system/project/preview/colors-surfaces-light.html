<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame light">
  <div class="eyebrow">Surfaces — light mode</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="swatch" style="background:#e8edf4;color:#0f172a;border:1px solid #cbd5e1">Page<span class="hex">#e8edf4</span></div>
    <div class="swatch" style="background:#ffffff;color:#0f172a;border:1px solid #cbd5e1">Paper<span class="hex">#ffffff</span></div>
    <div class="swatch" style="background:rgba(124,58,237,0.10);color:#5b21b6;border:1px solid #cbd5e1">Tint Violet 10%<span class="hex">— selected</span></div>
  </div>
  <div style="font-size:12px;color:#64748b;line-height:1.55">
    Pure-Pixel Rule: #fff only on paper. Page is a cool slate tint so cards stay distinct.
  </div>
</div></body></html>
