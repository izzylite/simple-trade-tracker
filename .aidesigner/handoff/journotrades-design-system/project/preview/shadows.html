<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div class="eyebrow">Shadows · sm / md / lg / xl (dark)</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    <div style="background:#131313;height:80px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-secondary)">sm · button rest</div>
    <div style="background:#131313;height:80px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-secondary)">md · cards</div>
    <div style="background:#131313;height:80px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-secondary)">lg · popovers</div>
    <div style="background:#131313;height:80px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-secondary)">xl · dialogs</div>
  </div>
  <div style="font-size:12px;color:var(--fg-secondary);line-height:1.55">Mostly flat. Shadows reserved for elements that genuinely float. Hover lifts one tier — never two.</div>
</div></body></html>
